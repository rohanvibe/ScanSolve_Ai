<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanSolve</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            /* Blue-500 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
    <div class="max-w-md mx-auto p-4 flex flex-col items-center">
        <!-- Top section -->
        <header class="w-full text-center py-6 mb-2">
            <h1 class="text-4xl font-extrabold text-blue-600 tracking-tight">ScanSolve</h1>
            <p class="text-gray-500 mt-2 text-sm font-medium">AI-Powered Math & Homework Assistant</p>
        </header>

        <!-- Middle: Camera preview box -->
        <div class="w-full bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden relative"
            style="height: 320px;">
            <video id="video" class="w-full h-full object-cover hidden" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>

            <!-- Targeting Overlay (cropping boundary) -->
            <div id="target-overlay" class="absolute inset-0 hidden pointer-events-none">
                <div class="absolute inset-0 bg-black bg-opacity-40"></div>
                <div
                    class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-4/5 h-1/2 border-2 border-dashed border-blue-400 rounded-lg shadow-[0_0_0_9999px_rgba(0,0,0,0.4)] bg-transparent z-10 box-border">
                    <span
                        class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-white text-xs font-semibold whitespace-nowrap drop-shadow-md">Place
                        question here</span>
                </div>
            </div>

            <div id="camera-placeholder"
                class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-100 z-20">
                <svg class="w-16 h-16 mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span class="text-sm font-semibold">Camera is off</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="w-full flex gap-3 mt-6">
            <button id="camera-btn"
                class="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3 px-4 rounded-xl shadow transition duration-200 flex items-center justify-center">
                Open Camera
            </button>
            <button id="capture-btn"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow transition duration-200 hidden flex items-center justify-center">
                Capture & Solve
            </button>
        </div>

        <!-- Loading -->
        <div id="loading-indicator" class="hidden flex-col items-center justify-center mt-8 gap-y-4">
            <div class="loader"></div>
            <p class="text-blue-600 font-semibold animate-pulse">Analyzing question...</p>
        </div>

        <!-- Bottom section: Result card -->
        <div id="result-card" class="w-full bg-white rounded-2xl shadow-md border border-gray-200 mt-8 p-6 hidden mb-8">
            <h2 class="text-xl font-bold border-b pb-3 mb-4 text-gray-900">Solution</h2>
            <div id="result-content" class="text-sm whitespace-pre-wrap leading-relaxed text-gray-700 space-y-2"></div>
        </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>

</html>
